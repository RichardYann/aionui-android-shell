name: harmony-release-unsigned

on:
  workflow_dispatch:
  push:
    paths:
      - harmony-shell/**
      - .github/workflows/harmony-release-unsigned.yml

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CLI_URL: "http://kodo-sgp.aitogo.work/commandline-tools-linux-x64-6.0.1.251.zip"
      COMMANDLINE_TOOL_DIR: .harmony-cli
      PROJECT_PATH: harmony-shell
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache command line tools
        id: cache_cli
        uses: actions/cache@v4
        with:
          path: ${{ env.COMMANDLINE_TOOL_DIR }}
          key: harmony-cli-${{ runner.os }}-${{ env.CLI_URL }}

      - name: Download command line tools
        if: steps.cache_cli.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${CLI_URL}" ]]; then
            echo "Missing CLI_URL."
            exit 2
          fi
          rm -rf "${COMMANDLINE_TOOL_DIR}"
          mkdir -p "${COMMANDLINE_TOOL_DIR}"
          archive_path="${GITHUB_WORKSPACE}/commandline-tools.zip"
          curl -fL "${CLI_URL}" -o "${archive_path}"
          unzip -q "${archive_path}" -d "${COMMANDLINE_TOOL_DIR}"
          if [[ ! -d "${COMMANDLINE_TOOL_DIR}/command-line-tools" ]]; then
            found="$(find "${COMMANDLINE_TOOL_DIR}" -maxdepth 3 -type d -name command-line-tools -print -quit || true)"
            if [[ -z "${found}" ]]; then
              echo "command-line-tools directory not found after unzip"
              exit 3
            fi
            root="$(dirname "${found}")"
            rm -rf "${COMMANDLINE_TOOL_DIR}"
            mv "${root}" "${COMMANDLINE_TOOL_DIR}"
          fi

      - name: Setup PATH
        shell: bash
        run: |
          set -euo pipefail
          tool_root="${GITHUB_WORKSPACE}/${COMMANDLINE_TOOL_DIR}/command-line-tools"
          echo "${tool_root}/bin" >> "${GITHUB_PATH}"
          if [[ -d "${tool_root}/tool/node/bin" ]]; then
            echo "${tool_root}/tool/node/bin" >> "${GITHUB_PATH}"
          fi
          node_modules_paths=()
          if [[ -d "${tool_root}/tool/node_modules" ]]; then
            node_modules_paths+=("${tool_root}/tool/node_modules")
          fi
          if [[ -d "${tool_root}/node_modules" ]]; then
            node_modules_paths+=("${tool_root}/node_modules")
          fi
          if [[ ${#node_modules_paths[@]} -gt 0 ]]; then
            node_path="$(IFS=:; echo "${node_modules_paths[*]}")"
            echo "NODE_PATH=${node_path}" >> "${GITHUB_ENV}"
          fi

      - name: Configure registries
        shell: bash
        run: |
          set -euo pipefail
          npm config set registry https://repo.huaweicloud.com/repository/npm/
          npm config set "@ohos:registry" https://repo.harmonyos.com/npm/
          ohpm config set registry https://ohpm.openharmony.cn/ohpm/
          ohpm config set strict_ssl false

      - name: Install deps (project)
        shell: bash
        run: |
          set -euo pipefail
          cd "${PROJECT_PATH}"
          ohpm install --all

      - name: Install deps (module)
        shell: bash
        run: |
          set -euo pipefail
          cd "${PROJECT_PATH}/entry"
          ohpm install --all

      - name: Inspect CLI runtime packages
        shell: bash
        run: |
          set -euo pipefail
          tool_root="${GITHUB_WORKSPACE}/${COMMANDLINE_TOOL_DIR}/command-line-tools"
          find "${tool_root}" -maxdepth 4 \( -path '*/@ohos/hvigor' -o -path '*/@ohos/hvigor-ohos-plugin' \) -type d | sort || true

      - name: Normalize hvigorw
        shell: bash
        run: |
          set -euo pipefail
          cd "${PROJECT_PATH}"
          sed -i 's/\r$//' ./hvigorw
          chmod +x ./hvigorw
          head -n 5 ./hvigorw

      - name: Inspect hvigorw
        shell: bash
        run: |
          set -euo pipefail
          cd "${PROJECT_PATH}"
          cli_root="${GITHUB_WORKSPACE}/${COMMANDLINE_TOOL_DIR}"
          COMMANDLINE_TOOL_DIR="${cli_root}" bash -x ./hvigorw -v || true
          node -p "require.resolve('@ohos/hvigor-ohos-plugin/package.json')"
          node -p "require.resolve('@ohos/hvigor/package.json')"

      - name: Clean Harmony project
        shell: bash
        run: |
          set -euo pipefail
          cd "${PROJECT_PATH}"
          cli_root="${GITHUB_WORKSPACE}/${COMMANDLINE_TOOL_DIR}"
          COMMANDLINE_TOOL_DIR="${cli_root}" bash -x ./hvigorw -p product=default clean --no-daemon --stacktrace

      - name: Build release HAP (unsigned)
        shell: bash
        run: |
          set -euo pipefail
          cd "${PROJECT_PATH}"
          cli_root="${GITHUB_WORKSPACE}/${COMMANDLINE_TOOL_DIR}"
          COMMANDLINE_TOOL_DIR="${cli_root}" bash -x ./hvigorw --mode module -p product=default -p module=entry@default -p buildMode=release assembleHap --no-daemon --stacktrace

      - name: Upload HAP artifacts
        uses: actions/upload-artifact@v4
        with:
          name: harmony-hap-release-unsigned
          path: |
            harmony-shell/**/build/**/outputs/**/*.hap
          if-no-files-found: error
