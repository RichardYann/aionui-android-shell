name: android-release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version in semantic version format (for example: 1.2.3)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-release-apk:
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ github.event.inputs.version }}
      RELEASE_TAG: v${{ github.event.inputs.version }}
      RELEASE_FILE: aionui-shell-v${{ github.event.inputs.version }}.apk
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          set -euo pipefail
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-}"
          echo "ANDROID_HOME=${ANDROID_HOME:-}"

          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          if [ -z "$SDK_ROOT" ]; then
            echo "ANDROID_SDK_ROOT/ANDROID_HOME is not set"
            exit 1
          fi

          SDKMANAGER="$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="$SDK_ROOT/cmdline-tools/bin/sdkmanager"
          fi
          if [ ! -x "$SDKMANAGER" ]; then
            echo "sdkmanager not found under $SDK_ROOT/cmdline-tools"
            find "$SDK_ROOT" -maxdepth 4 -type f -name sdkmanager -print || true
            exit 1
          fi

          "$SDKMANAGER" --version
          yes | "$SDKMANAGER" --licenses > /dev/null || true
          "$SDKMANAGER" \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Setup Gradle wrapper
        shell: bash
        run: |
          set -euo pipefail
          chmod +x android-shell/gradlew
          curl -fsSL -o gradle.zip https://services.gradle.org/distributions/gradle-8.7-bin.zip
          unzip -q gradle.zip -d .
          ./gradle-8.7/bin/gradle -p android-shell wrapper

      - name: Validate semantic version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${RELEASE_VERSION}"

          if [[ -z "$VERSION" ]]; then
            echo "version input is required"
            exit 1
          fi

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid semantic version: $VERSION"
            echo "Expected format: x.y.z"
            exit 1
          fi

          echo "Validated release version: $VERSION"
          echo "Resolved tag: $RELEASE_TAG"
          echo "Planned release file: $RELEASE_FILE"

      - name: Build release APK
        shell: bash
        run: |
          set -euo pipefail
          chmod +x android-shell/gradlew
          cd android-shell
          set +e
          ./gradlew :app:assembleRelease --no-daemon --stacktrace 2>&1 | tee build-release.log
          EXIT_CODE=${PIPESTATUS[0]}
          echo "$EXIT_CODE" > build-release.exitcode
          set -e
          exit "$EXIT_CODE"

      - name: Upload release build logs
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: release-build-logs
          path: |
            android-shell/build-release.log
            android-shell/build-release.exitcode
          if-no-files-found: warn

      - name: Prepare versioned release APK
        if: ${{ success() }}
        shell: bash
        run: |
          set -euo pipefail
          SOURCE=""
          for candidate in \
            "android-shell/app/build/outputs/apk/release/app-release.apk" \
            "android-shell/app/build/outputs/apk/release/app-release-unsigned.apk"
          do
            if [ -f "$candidate" ]; then
              SOURCE="$candidate"
              break
            fi
          done

          if [ -z "$SOURCE" ]; then
            echo "release APK not found in expected release output locations"
            find android-shell/app/build/outputs/apk -maxdepth 3 -type f -name "*.apk" -print || true
            exit 1
          fi

          cp "$SOURCE" "$RELEASE_FILE"

      - name: Upload release APK artifact
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: ${{ env.RELEASE_FILE }}

      - name: Check release tag does not already exist
        if: ${{ success() }}
        shell: bash
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}" > /dev/null 2>&1; then
            echo "tag ${RELEASE_TAG} already exists"
            exit 1
          fi

      - name: Create release tag
        if: ${{ success() }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${RELEASE_TAG}"
          git push origin "${RELEASE_TAG}"

      - name: Create GitHub Release
        if: ${{ success() }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: AionUi Shell for Android / AionUi Android 客户端 ${{ env.RELEASE_TAG }}
          files: ${{ env.RELEASE_FILE }}
          body: |
            ## Overview / 版本说明

            AionUi Shell for Android is a lightweight Android shell for AionUi WebUI.
            AionUi Android 客户端是一个面向 AionUi WebUI 的轻量 Android 壳应用。

            ## Highlights / 本版亮点

            - Connect to your AionUi server quickly and reopen the last server on later launches
            - Immersive top navigation that stays out of the way and reveals on demand
            - Clear loading feedback during connection and refresh
            - Supports file upload and Android system downloads
            - Updated launcher branding with the AionUI logo
            - 快速连接你的 AionUi 服务器，并在下次启动时自动重新打开最近一次连接
            - 顶部导航更沉浸，需要时再唤出，不打断页面内容
            - 连接与刷新过程中提供清晰的加载反馈
            - 支持文件上传与 Android 系统下载
            - 启动图标已更新为 AionUI 品牌标识

            ## Downloads / 下载内容

            - Release asset: `${{ env.RELEASE_FILE }}`
            - 下载文件：`${{ env.RELEASE_FILE }}`

            ## Install / 安装方式

            - Install this build by downloading the APK asset from this release page
            - If Android blocks the installation, allow installation from unknown sources for this install
            - 可直接从本发布页下载 APK 安装
            - 如果系统拦截安装，请为本次安装允许“未知来源应用安装”

            ## Current Limitations / 当前限制

            - This stage prioritizes release automation first
            - Formal production signing will be added later
            - 当前阶段优先完成自动化发布链路
            - 正式生产签名将在后续版本补充

            ## Changelog / 更新记录

            - Full changelog: https://github.com/RichardYann/aionui-android-shell/commits/${{ env.RELEASE_TAG }}
            - 完整更新记录：https://github.com/RichardYann/aionui-android-shell/commits/${{ env.RELEASE_TAG }}
