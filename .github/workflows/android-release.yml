name: android-release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version in semantic version format (for example: 1.2.3)"
        required: true
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-release-apk:
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ github.event.inputs.version }}
      RELEASE_TAG: v${{ github.event.inputs.version }}
      RELEASE_FILE: aionui-shell-v${{ github.event.inputs.version }}.apk
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK packages
        shell: bash
        run: |
          set -euo pipefail
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-}"
          echo "ANDROID_HOME=${ANDROID_HOME:-}"

          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          if [ -z "$SDK_ROOT" ]; then
            echo "ANDROID_SDK_ROOT/ANDROID_HOME is not set"
            exit 1
          fi

          SDKMANAGER="$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="$SDK_ROOT/cmdline-tools/bin/sdkmanager"
          fi
          if [ ! -x "$SDKMANAGER" ]; then
            echo "sdkmanager not found under $SDK_ROOT/cmdline-tools"
            find "$SDK_ROOT" -maxdepth 4 -type f -name sdkmanager -print || true
            exit 1
          fi

          "$SDKMANAGER" --version
          yes | "$SDKMANAGER" --licenses > /dev/null || true
          "$SDKMANAGER" \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Setup Gradle wrapper
        shell: bash
        run: |
          set -euo pipefail
          chmod +x android-shell/gradlew
          curl -fsSL -o gradle.zip https://services.gradle.org/distributions/gradle-8.7-bin.zip
          unzip -q gradle.zip -d .
          ./gradle-8.7/bin/gradle -p android-shell wrapper

      - name: Validate semantic version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${RELEASE_VERSION}"

          if [[ -z "$VERSION" ]]; then
            echo "version input is required"
            exit 1
          fi

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid semantic version: $VERSION"
            echo "Expected format: x.y.z"
            exit 1
          fi

          echo "Validated release version: $VERSION"
          echo "Resolved tag: $RELEASE_TAG"
          echo "Planned release file: $RELEASE_FILE"

      - name: Build release APK
        shell: bash
        run: |
          set -euo pipefail
          chmod +x android-shell/gradlew
          cd android-shell
          set +e
          ./gradlew :app:assembleRelease --no-daemon --stacktrace 2>&1 | tee build-release.log
          EXIT_CODE=${PIPESTATUS[0]}
          echo "$EXIT_CODE" > build-release.exitcode
          set -e
          exit "$EXIT_CODE"

      - name: Upload release build logs
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: release-build-logs
          path: |
            android-shell/build-release.log
            android-shell/build-release.exitcode
          if-no-files-found: warn

      - name: Prepare versioned release APK
        if: ${{ success() }}
        shell: bash
        run: |
          set -euo pipefail
          SOURCE="android-shell/app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$SOURCE" ]; then
            echo "release APK not found at: $SOURCE"
            find android-shell/app/build/outputs/apk -maxdepth 3 -type f -name "*.apk" -print || true
            exit 1
          fi

          cp "$SOURCE" "$RELEASE_FILE"

      - name: Verify APK signature
        if: ${{ success() }}
        shell: bash
        run: |
          set -euo pipefail
          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          if [ -z "$SDK_ROOT" ]; then
            echo "ANDROID_SDK_ROOT/ANDROID_HOME is not set"
            exit 1
          fi

          APKSIGNER="$SDK_ROOT/build-tools/34.0.0/apksigner"
          if [ ! -x "$APKSIGNER" ]; then
            echo "apksigner not found at $APKSIGNER"
            find "$SDK_ROOT" -maxdepth 4 -type f -name apksigner -print || true
            exit 1
          fi

          "$APKSIGNER" verify --verbose --print-certs "$RELEASE_FILE"

      - name: Upload release APK artifact
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: ${{ env.RELEASE_FILE }}

      - name: Check release tag does not already exist
        if: ${{ success() }}
        shell: bash
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}" > /dev/null 2>&1; then
            echo "tag ${RELEASE_TAG} already exists"
            exit 1
          fi

      - name: Create release tag
        if: ${{ success() }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${RELEASE_TAG}"
          git push origin "${RELEASE_TAG}"

      - name: Create GitHub Release
        if: ${{ success() }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          files: ${{ env.RELEASE_FILE }}
          body: |
            ## Overview / 版本说明

            AionUi Shell for Android is a lightweight Android shell for AionUi WebUI.
            AionUi Android 客户端是一个面向 AionUi WebUI 的轻量 Android 壳应用。

            ## Highlights / 本版亮点

            - Quick server connection and automatic reopen of the last connected workspace
            - Immersive top navigation that appears only when needed
            - Clear loading feedback during connection and refresh
            - Support for file upload and Android system downloads
            - AionUI-branded launcher experience
            - 支持快速连接服务器，并自动重新打开最近一次连接的工作区
            - 顶部导航更沉浸，只在需要时出现
            - 连接与刷新过程中提供清晰的加载反馈
            - 支持文件上传与 Android 系统下载
            - 启动图标与整体观感更贴近 AionUI 品牌体验
