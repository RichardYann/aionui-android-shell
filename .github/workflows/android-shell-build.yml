name: android-shell-build

on:
  workflow_dispatch:
  push:
    paths:
      - android-shell/**
      - .github/workflows/android-shell-build.yml

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          set -euo pipefail
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-}"
          echo "ANDROID_HOME=${ANDROID_HOME:-}"

          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          if [ -z "$SDK_ROOT" ]; then
            echo "ANDROID_SDK_ROOT/ANDROID_HOME is not set"
            exit 1
          fi

          SDKMANAGER="$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="$SDK_ROOT/cmdline-tools/bin/sdkmanager"
          fi
          if [ ! -x "$SDKMANAGER" ]; then
            echo "sdkmanager not found under $SDK_ROOT/cmdline-tools"
            find "$SDK_ROOT" -maxdepth 4 -type f -name sdkmanager -print || true
            exit 1
          fi

          "$SDKMANAGER" --version
          yes | "$SDKMANAGER" --licenses > /dev/null || true
          "$SDKMANAGER" \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Setup Gradle wrapper
        shell: bash
        run: |
          set -euo pipefail
          chmod +x android-shell/gradlew
          curl -fsSL -o gradle.zip https://services.gradle.org/distributions/gradle-8.7-bin.zip
          unzip -q gradle.zip -d .
          ./gradle-8.7/bin/gradle -p android-shell wrapper

      - name: Build debug APK
        shell: bash
        run: |
          set -euo pipefail
          chmod +x android-shell/gradlew
          cd android-shell
          ./gradlew :app:assembleDebug --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android-shell/app/build/outputs/apk/debug/app-debug.apk
