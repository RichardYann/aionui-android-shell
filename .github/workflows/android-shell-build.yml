name: android-shell-build

on:
  workflow_dispatch:
  push:
    paths:
      - android-shell/**
      - .github/workflows/android-shell-build.yml

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle wrapper
        shell: bash
        run: |
          set -euo pipefail
          chmod +x android-shell/gradlew
          curl -fsSL -o gradle.zip https://services.gradle.org/distributions/gradle-8.7-bin.zip
          unzip -q gradle.zip -d .
          ./gradle-8.7/bin/gradle -p android-shell wrapper

      - name: Build debug APK
        shell: bash
        run: |
          set -euo pipefail
          chmod +x android-shell/gradlew
          cd android-shell
          ./gradlew :app:assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android-shell/app/build/outputs/apk/debug/app-debug.apk
